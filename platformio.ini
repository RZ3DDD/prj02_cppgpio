; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
; default_envs = az-delivery-devkit-v4, nologo_esp32c3_super_mini 
; default_envs = nologo_esp32c3_super_mini
default_envs = az-delivery-devkit-v4

[env]
build_type = debug
monitor_speed = 115200
monitor_filters =
    direct
    ;colorize
    time
    ;esp32_exception_decoder


[env:nologo_esp32c3_super_mini]
platform = espressif32
board = nologo_esp32c3_super_mini
framework = espidf


[env:az-delivery-devkit-v4]
platform = espressif32
board = az-delivery-devkit-v4
framework = espidf
; изменить микроконтроллер
; board_build.mcu = esp32
; изменить частоту микроконтроллера
; board_build.f_cpu = 240000000L
